<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TML W2 2026 — Vote entre amis</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- SCREEN: Login -->
<div id="screen-login" class="screen active">
  <div class="login-bg"><div class="login-particles" id="particles"></div></div>
  <div class="login-card">
    <div class="tml-badge">TML · W2 · 24–26 JUILLET 2026</div>
    <h1>Qui es-tu ?</h1>
    <p class="login-sub">Choisis ton prénom pour voter sur la programmation.</p>
    <div id="user-list" class="user-list"></div>
    <div class="add-user-row">
      <input type="text" id="new-user-input" placeholder="Ajouter un prénom…" maxlength="20" />
      <button id="add-user-btn">+</button>
    </div>
  </div>
</div>

<!-- SCREEN: Vote -->
<div id="screen-vote" class="screen">
  <header class="topbar">
    <div class="topbar-left">
      <span class="topbar-badge">TML W2</span>
      <span id="topbar-user" class="topbar-user"></span>
    </div>
    <nav class="topbar-nav">
      <button class="nav-btn active" data-view="timetable">🗓 Timetable</button>
      <button class="nav-btn" data-view="results">🏆 Résultats</button>
    </nav>
    <button id="reset-btn" class="reset-btn">🗑 Reset</button>
    <button id="logout-btn" class="logout-btn">Changer</button>
  </header>

  <!-- TIMETABLE VIEW -->
  <div id="view-timetable" class="view active">
    <div class="tt-day-bar">
      <button class="day-tab active" data-day="1">🌙 Ven 24</button>
      <button class="day-tab" data-day="2">⚡ Sam 25</button>
      <button class="day-tab" data-day="3">🔥 Dim 26</button>
      <div class="vote-legend">
        <span class="leg" style="--c:#FF6B35">🔥 Priorité</span>
        <span class="leg" style="--c:#3498DB">👍 Si dispo</span>
        <span class="leg" style="--c:#7878a0">🤷 Pourquoi pas</span>
      </div>
    </div>
    <div class="tt-scroll-wrap">
      <div id="timetable-grid" class="timetable-grid"></div>
    </div>
  </div>

  <!-- RESULTS VIEW -->
  <div id="view-results" class="view">
    <div class="results-header">
      <h2>Classement du groupe</h2>
      <p class="results-sub">Score: 🔥×3pts · 👍×2pts · 🤷×1pt</p>
      <div class="participant-chips" id="participant-chips"></div>
    </div>
    <div class="results-day-tabs" id="results-day-tabs">
      <button class="rtab active" data-rday="all">Tous</button>
      <button class="rtab" data-rday="1">Ven 24</button>
      <button class="rtab" data-rday="2">Sam 25</button>
      <button class="rtab" data-rday="3">Dim 26</button>
    </div>
    <div id="results-list" class="results-list"></div>
  </div>
</div>

<!-- RESET MODAL -->
<div id="reset-overlay" class="modal-overlay">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-name" style="margin-bottom:8px">🗑 Reset mes votes</div>
    <p style="color:var(--muted);font-size:13px;margin-bottom:20px">Choisir le jour à effacer :</p>
    <div class="modal-btns">
      <button class="mvbtn" style="--vc:#FF6B35" onclick="resetDay(1)"><span class="mvbtn-emoji">🌙</span><span class="mvbtn-label">Vendredi 24/07</span></button>
      <button class="mvbtn" style="--vc:#3498DB" onclick="resetDay(2)"><span class="mvbtn-emoji">⚡</span><span class="mvbtn-label">Samedi 25/07</span></button>
      <button class="mvbtn" style="--vc:#E91E8C" onclick="resetDay(3)"><span class="mvbtn-emoji">🔥</span><span class="mvbtn-label">Dimanche 26/07</span></button>
      <button class="mvbtn" style="--vc:#E74C3C" onclick="resetDay('all')"><span class="mvbtn-emoji">💥</span><span class="mvbtn-label">Tous les jours</span></button>
    </div>
    <button class="modal-close" onclick="closeReset()">Annuler</button>
  </div>
</div>

<!-- VOTE MODAL -->
<div id="modal-overlay" class="modal-overlay"></div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  (function() {
    var photos = ['img/p1.jpg','img/p2.jpg','img/p3.jpg','img/p4.jpg','img/p5.jpg','img/p6.jpg'];
    var strip = document.createElement('div');
    strip.className = 'photo-strip';
    var track = document.createElement('div');
    track.className = 'photo-track';
    var all = photos.concat(photos);
    track.innerHTML = all.map(function(src){ return '<img class="photo-frame" src="' + src + '" />'; }).join('');
    strip.appendChild(track);
    document.body.appendChild(strip);
  })();
</script>
</body>
</html>
